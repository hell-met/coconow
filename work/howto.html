<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoCoNow-ココナ- | 使い方</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="comic-shell">
      <section class="comic-head" aria-labelledby="guide-title">
        <p class="eyebrow">日本限定リアルタイムハッシュタグ</p>
        <h1 id="guide-title">
          <span>CoCoNow</span>
          <small>ココナの使い方</small>
        </h1>
        <p class="lead">同じ時間に同じ場所。リアルに会うためのハッシュタグ。</p>
        <a class="primary-link" href="./index.html">#タグを発行する</a>
      </section>

      <section class="comic-strip" aria-label="CoCoNowの使い方">
        <article class="image-panel">
          <img src="./assets/howto/panel-1-bored.png" alt="ヒマな午後にスマホを見ながら近くで遊べる人を探したいと思っている場面" />
          <div class="panel-caption">
            <span>SCENE</span>
            <p>今日ヒマだな～。近くで一緒に遊べる人いないかな？</p>
          </div>
        </article>

        <article class="image-panel">
          <img src="./assets/howto/panel-2-issue.png" alt="スマホでタグ発行ボタンを押して、場所を暗号化したタグを作る場面" />
          <div class="panel-caption">
            <span>1</span>
            <p>「#タグを発行」をタップ。1時間に1回更新の、場所を暗号化したタグが出るよ。</p>
          </div>
        </article>

        <article class="image-panel">
          <img src="./assets/howto/panel-3-post.png" alt="SNSにハッシュタグを付けて投稿し、同じタグの投稿を探す場面" />
          <div class="panel-caption">
            <span>2</span>
            <p>SNSでタグと一緒に投稿。そのタグをタップして、同じタグの投稿を探してみよう。</p>
          </div>
        </article>

        <article class="image-panel">
          <img src="./assets/howto/panel-4-search.png" alt="公共の場所で近くの人と安全に合流する場面" />
          <div class="panel-caption">
            <span>3</span>
            <p>
              同じタグの人がいれば、いま近くにいる合図。連絡するときは直接的な場所を明かさず、
              人通りのある場所で安全にやり取りしよう。
            </p>
          </div>
        </article>

        <article class="final-card">
          <p>CoCoNow-ココナ-をきっかけに、運命の出会いがあるかも？？</p>
          <a class="secondary-link" href="./index.html">発行ページへ</a>
        </article>
      </section>
    </main>
  </body>
</html>
