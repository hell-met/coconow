<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COCONOW - ココナウ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <p class="eyebrow">日本限定リアルタイムハッシュタグ</p>
        <h1 id="app-title">
          <span>COCONOW</span>
          <small>ココナウ</small>
        </h1>
        <p class="lead">
          今いる場所と時間が重なる人だけに届く、場所を隠した出会い用ハッシュタグ。
        </p>
      </section>

      <section class="generator" aria-label="ハッシュタグ発行">
        <button class="primary-button" id="issueButton" type="button">
          #タグ発行
        </button>

        <output class="tag-output" id="tagOutput" aria-live="polite">
          <span>ボタンを押すと位置情報を確認してタグを発行します</span>
        </output>

        <div class="postal-panel" id="postalPanel" hidden>
          <label class="field">
            <span>検出エリア（郵便番号の上6桁）</span>
            <input
              id="postalArea"
              type="text"
              inputmode="numeric"
              autocomplete="postal-code"
              placeholder="例: 556000"
              maxlength="7"
            />
          </label>
          <button class="secondary-button" id="reissueButton" type="button">
            修正して再発行
          </button>
        </div>

        <div class="actions" id="actions" hidden>
          <p class="actions-title">タグを投稿する</p>
          <button class="share-button primary-share" data-share="native" type="button">
            スマホで共有
          </button>
          <button class="copy-button" id="copyButton" type="button">コピー</button>
          <button class="share-button" data-share="x" type="button">X</button>
          <button class="share-button" data-share="threads" type="button">Threads</button>
          <button class="share-button" data-share="bluesky" type="button">Bluesky</button>
          <button class="share-button" data-share="line" type="button">LINE</button>
        </div>

        <p id="message" class="message" role="status" aria-live="polite"></p>

        <p class="attribution">
          郵便番号の確認に
          <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">
            OpenStreetMap
          </a>
          のデータを使用しています。
        </p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
